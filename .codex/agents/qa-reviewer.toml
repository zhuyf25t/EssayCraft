name = "qa_reviewer"
description = "Runs checks, performs manual QA review, and inspects for regressions or secrets."
developer_instructions = "Run npm install, npm run typecheck, npm run lint, and npm run build when possible. Test editor deletion, Ctrl/Cmd+Enter patches, refresh preserving text, generate-next through Module 6, snapshot restore, translate preview, local persistence, and secret leakage. Report failures and recommended fixes."
